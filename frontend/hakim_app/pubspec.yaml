name: hakim_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  google_sign_in: ^7.2.0
  flutter_secure_storage: 10.3.1
  hive_ce_flutter: ^2.3.4
  cryptography: ^2.9.0
  connectivity_plus: 6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/hakim_app_icon.png"
  adaptive_icon_background: "#F4FDFC"
  adaptive_icon_foreground: "assets/branding/hakim_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8FAFC"
  image: assets/branding/hakim_splash_logo.png
  android: true
  ios: false
  web: false

  android_12:
    color: "#F8FAFC"
    image: assets/branding/hakim_icon_foreground.png
    icon_background_color: "#F8FAFC"